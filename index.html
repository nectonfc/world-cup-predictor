<!DOCTYPE html>
<html>
<head>
    <title>Necton FC World Cup Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1, .subtitle, .status, .updated, .footer {
            text-align: center;
        }

        h1 {
            color: #006400;
        }

        .subtitle {
            font-size: 20px;
            font-weight: bold;
        }

        .status {
            color: #666;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #006400;
            color: white;
            padding: 10px;
        }

        td {
            padding: 9px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        td:nth-child(1),
        td:nth-child(3),
        td:nth-child(4) {
            text-align: center;
        }

        .updated {
            margin-top: 20px;
            color: #666;
        }

        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<h1>🏆 Necton FC World Cup Predictor</h1>

<p class="subtitle">League Table</p>

<p class="status">Updated after Round 1 Match 12 (R1M12)</p>

<table>

</html>
